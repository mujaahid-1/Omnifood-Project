<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style/style.css" />
    <title>Omnifood</title>
  </head>
  <body>
    <header class="header">
      <img src="./img/omnifood-logo.png" alt="Omnifood logo" class="logo" />

      <nav class="main-nav">Navigation</nav>
    </header>

    <main>
      <section class="section-hero">
        <div class="hero">
          <!-- Hero Text -->
          <div class="hero-text-box">
            <h1 class="heading-primary">
              A healthy meal delivered to your door, every single day
            </h1>
            <p class="hero-description">
              The smart 365-days-per-year food subscription that will make you
              eat healthy again. Tailored to your personal tastes and
              nutritional needs.
            </p>
            <a href="#" class="btn left--btn margin-right-sm"
              >Start eating well</a
            >
            <a href="#" class="btn right--btn">Learn more &darr;</a>
            <div class="delivered-meals">
              <div class="delivered-images">
                <img
                  src="./img/customers/customer-1.jpg"
                  alt="customer photo"
                />
                <img
                  src="./img/customers/customer-2.jpg"
                  alt="customer photo"
                />
                <img
                  src="./img/customers/customer-3.jpg"
                  alt="customer photo"
                />
                <img
                  src="./img/customers/customer-4.jpg"
                  alt="customer photo"
                />
                <img
                  src="./img/customers/customer-5.jpg"
                  alt="customer photo"
                />
                <img
                  src="./img/customers/customer-6.jpg"
                  alt="customer photo"
                />
              </div>
              <p class="delivered-text">
                <span>250,000+</span> meals delivered last year!
              </p>
            </div>
          </div>
          <!-- Hero Image -->
          <div class="hero-image-box">
            <img
              src="img/hero.png"
              class="hero-image"
              alt="Woman enjoying food, meals in storage container, and food bowls on  a table"
            />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
